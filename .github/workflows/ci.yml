name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,app]"
      - name: Ruff
        run: |
          ruff check ingestion warehouse tests
          ruff format --check ingestion warehouse tests
      - name: Mypy
        run: mypy ingestion
      - name: Pytest
        run: pytest
      - name: Dry-run refresh (seeds only)
        run: python -m ingestion.run_refresh --dry-run --skip-cloud --skip-hf
