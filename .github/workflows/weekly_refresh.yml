name: Weekly dataset refresh

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Write Snowflake private key
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          if [ -z "$SNOWFLAKE_PRIVATE_KEY" ]; then
            echo "Missing secret SNOWFLAKE_PRIVATE_KEY" >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "$SNOWFLAKE_PRIVATE_KEY" > "${RUNNER_TEMP}/snowflake_key.pem"
          echo "SNOWFLAKE_PRIVATE_KEY_PATH=${RUNNER_TEMP}/snowflake_key.pem" >> "$GITHUB_ENV"
      - name: Refresh
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          python -m ingestion.run_refresh
          echo "Refresh finished OK"
