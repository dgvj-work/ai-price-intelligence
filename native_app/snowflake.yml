definition_version: 2

entities:
  pkg:
    type: application package
    identifier: cortex_cost_advisor_pkg
    stage: app_src.stage
    manifest: app/manifest.yml
    artifacts:
      - src: app/*
        dest: ./
      - src: src/*
        dest: ./src/
        ignore:
          - "**/__pycache__/**"
          - "**/*.pyc"
          - "**/.DS_Store"
      # Dotdirs are easy to miss in globs; theme must ship for Native App Streamlit.
      - src: src/streamlit/.streamlit/*
        dest: ./src/streamlit/.streamlit/
      # Optional listing/brand assets (UI uses text monogram; PNG kept for Marketplace).
      - src: src/streamlit/assets/*
        dest: ./src/streamlit/assets/
    meta:
      role: AI_PRICE_ADMIN
      warehouse: COMPUTE_WH

  app:
    type: application
    identifier: cortex_cost_advisor
    from:
      target: pkg
    debug: true
    meta:
      role: AI_PRICE_ADMIN
      warehouse: COMPUTE_WH
