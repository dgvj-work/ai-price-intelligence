definition_version: 2

entities:
  pkg:
    type: application package
    identifier: cortex_cost_advisor_pkg
    stage: app_src.stage
    manifest: app/manifest.yml
    artifacts:
      - src: app/*
        dest: ./
      - src: src/*
        dest: ./src/
        ignore:
          - "**/__pycache__/**"
          - "**/*.pyc"
    meta:
      role: AI_PRICE_ADMIN
      warehouse: COMPUTE_WH

  app:
    type: application
    identifier: cortex_cost_advisor
    from:
      target: pkg
    debug: true
    meta:
      role: AI_PRICE_ADMIN
      warehouse: COMPUTE_WH
